version: 1
id: classic-letter-a4
page:
  supported_sizes: [A4, A5]
  default_orientation: portrait
layout:
  margin_mm: 14
slots:
  - id: title
    type: text
    x_mm: 20
    y_mm: 20
    w_mm: 170
    h_mm: 30
    style: title
  - id: body
    type: text
    x_mm: 20
    y_mm: 60
    w_mm: 170
    h_mm: 150
    style: body
  - id: signature
    type: text
    x_mm: 20
    y_mm: 220
    w_mm: 170
    h_mm: 35
    style: signature
assets:
  - id: corner-ornament
    kind: decoration
    path: ../assets/corner-ornament.svg
styles:
  title:
    font: SerifDisplay
    size_pt: 26
    align: center
  body:
    font: SansBody
    size_pt: 12
    line_height: 1.4
  signature:
    font: SerifDisplay
    size_pt: 14
    align: right
